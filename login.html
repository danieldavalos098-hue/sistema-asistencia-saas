<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="application-name" content="Sistema de Asistencia - Estudiantes">
  <title>Sistema de Asistencia - Estudiantes</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .auth-brand { text-align: center; margin-bottom: 32px; }
    .auth-brand-icon { font-size: 40px; margin-bottom: 8px; }
    .auth-brand-name { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); }
    .auth-brand-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .auth-card h2 { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .auth-card p { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
    .auth-link { font-size: 14px; text-align: center; margin-top: 20px; color: var(--muted); }
    .auth-link a { color: var(--accent); font-weight: 600; }
    .divider { height: 1px; background: var(--border); margin: 24px 0; }
    .setup-info {
      background: rgba(245,200,0,0.06);
      border: 1px solid rgba(245,200,0,0.2);
      border-radius: 10px;
      padding: 14px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .setup-info strong { color: var(--accent); }
  </style>
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">🏫</div>
        <div class="auth-brand-name" data-brand-short-name>SISTEMA DE ASISTENCIA</div>
        <div class="auth-brand-sub" data-brand-entity-name>Institución Educativa</div>
      </div>

      <h2>Iniciar Sesion</h2>
      <p>Accede a tu panel de control</p>

      <div id="db-warning" class="setup-info" style="display:none">
        Supabase no configurado.
        <strong><a href="#" id="link-setup">Configura la base de datos</a></strong> primero.
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Correo electronico</label>
          <input type="email" id="login-email" class="form-input" placeholder="tu@email.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Contrasena</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <div id="login-error" class="form-error" style="margin-bottom:12px"></div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:13px">
          <span id="login-btn-text">Ingresar</span>
        </button>
      </form>

      <div class="divider"></div>

      <div class="auth-link">
        ¿No tienes cuenta? <a href="register.html">Crear cuenta gratuita</a>
      </div>
    </div>
  </div>

  <div id="setup-modal" style="display:none;position:fixed;inset:0;background:#0a0f1e;z-index:9999;align-items:center;justify-content:center">
    <div style="background:#111827;border:2px solid #f5c800;border-radius:20px;padding:36px;width:460px;max-width:92vw">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:36px">🗄️</div>
        <div style="font-size:20px;font-weight:800;color:#f5c800;margin:8px 0;font-family:'Montserrat',sans-serif">Conectar Supabase</div>
        <div style="font-size:13px;color:#64748b">Ingresa tus credenciales de Supabase para continuar</div>
      </div>
      <div class="form-group">
        <label class="form-label">Project URL</label>
        <input id="setup-url" type="url" class="form-input" placeholder="https://xxxxxxxx.supabase.co">
      </div>
      <div class="form-group">
        <label class="form-label">Anon Key</label>
        <textarea id="setup-key" rows="3" class="form-input" style="font-family:monospace;font-size:12px" placeholder="eyJhbGci..."></textarea>
      </div>
      <div id="setup-error" class="form-error" style="margin-bottom:12px"></div>
      <div style="display:flex;gap:10px">
        <button id="btn-setup-save" class="btn btn-primary" style="flex:1;justify-content:center;font-size:15px;padding:13px">Conectar</button>
        <button id="btn-setup-cancel" class="btn btn-secondary" style="padding:13px 18px">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { redirectIfLoggedIn, initLoginForm } from './js/auth.js';
    import { APP_CONFIG } from './js/config.js';
    import { applyBrandingToDocument } from './js/ui/brandingUI.js';
    import { getSupabase, resetSupabase } from './js/supabaseClient.js';
    import { showToast } from './js/ui.js';

    applyBrandingToDocument(APP_CONFIG);
    await redirectIfLoggedIn();

    if (!getSupabase()) {
      document.getElementById('db-warning').style.display = 'block';
    }

    document.getElementById('link-setup')?.addEventListener('click', (event) => {
      event.preventDefault();
      document.getElementById('setup-modal').style.display = 'flex';
    });

    document.getElementById('btn-setup-save')?.addEventListener('click', () => {
      const url = document.getElementById('setup-url').value.trim();
      const key = document.getElementById('setup-key').value.trim();
      const errorEl = document.getElementById('setup-error');

      if (!url || !key) {
        if (errorEl) errorEl.textContent = 'Completa ambos campos.';
        return;
      }

      try {
        resetSupabase(url, key);
        document.getElementById('setup-modal').style.display = 'none';
        document.getElementById('db-warning').style.display = 'none';
        showToast('Supabase conectado ✅', 'success');
      } catch (error) {
        if (errorEl) errorEl.textContent = `Error: ${error.message}`;
      }
    });

    document.getElementById('btn-setup-cancel')?.addEventListener('click', () => {
      document.getElementById('setup-modal').style.display = 'none';
    });

    initLoginForm();
  </script>
</body>
</html>
